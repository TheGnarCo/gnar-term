version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
      xterm:
        patterns:
          - "@xterm/*"
    ignore:
      # xterm packages are pinned to beta.196 channel for kitty keyboard protocol
      # support. Only upgrade within the beta channel after manual verification.
      # See CLAUDE.md "xterm.js beta versions" for rationale.
      - dependency-name: "@xterm/*"
        versions: [">=1.0.0"]

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
