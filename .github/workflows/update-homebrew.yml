name: 'Update Homebrew Tap'

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without v prefix, e.g. 0.2.3)'
        required: true

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macOS DMGs and compute sha256
        run: |
          VERSION=${{ steps.version.outputs.version }}
          curl -sL "https://github.com/TheGnarCo/gnar-term/releases/download/v${VERSION}/GnarTerm_${VERSION}_aarch64.dmg" -o aarch64.dmg
          curl -sL "https://github.com/TheGnarCo/gnar-term/releases/download/v${VERSION}/GnarTerm_${VERSION}_x64.dmg" -o x64.dmg
          echo "sha256_arm64=$(sha256sum aarch64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha256_x64=$(sha256sum x64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
        id: hashes

      - name: Setup SSH for homebrew-tap
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: TheGnarCo/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Update cask formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_ARM64: ${{ steps.hashes.outputs.sha256_arm64 }}
          SHA_X64: ${{ steps.hashes.outputs.sha256_x64 }}
        run: |
          python3 -c "
          import os
          v = os.environ['VERSION']
          sha_arm = os.environ['SHA_ARM64']
          sha_x64 = os.environ['SHA_X64']
          formula = '''cask \"gnar-term\" do
            version \"{version}\"

            if Hardware::CPU.arm?
              url \"https://github.com/TheGnarCo/gnar-term/releases/download/v#{{version}}/GnarTerm_#{{version}}_aarch64.dmg\"
              sha256 \"{sha_arm64}\"
            else
              url \"https://github.com/TheGnarCo/gnar-term/releases/download/v#{{version}}/GnarTerm_#{{version}}_x64.dmg\"
              sha256 \"{sha_x64}\"
            end

            name \"GnarTerm\"
            desc \"Terminal workspace manager for AI coding agents\"
            homepage \"https://github.com/TheGnarCo/gnar-term\"

            app \"GnarTerm.app\"

            zap trash: [
              \"~/Library/Caches/com.thegnar.gnar-term\",
              \"~/Library/Preferences/com.thegnar.gnar-term.plist\",
              \"~/Library/Saved Application State/com.thegnar.gnar-term.savedState\",
              \"~/.config/gnar-term\",
            ]
          end
          '''.format(version=v, sha_arm64=sha_arm, sha_x64=sha_x64)
          with open('Casks/gnar-term.rb', 'w') as f:
              f.write(formula)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/gnar-term.rb
          git commit -m "Update GnarTerm to ${{ steps.version.outputs.version }}"
          git push
