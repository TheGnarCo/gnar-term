<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawTab</title>
    <style>
      @font-face {
        font-family: 'JetBrainsMono Nerd Font Mono';
        src: url('/fonts/JetBrainsMonoNerdFontMono-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'JetBrainsMono Nerd Font Mono';
        src: url('/fonts/JetBrainsMonoNerdFontMono-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
      }
      @font-face {
        font-family: 'JetBrainsMono Nerd Font Mono';
        src: url('/fonts/JetBrainsMonoNerdFontMono-Italic.ttf') format('truetype');
        font-weight: 400;
        font-style: italic;
      }
      @font-face {
        font-family: 'JetBrainsMono Nerd Font Mono';
        src: url('/fonts/JetBrainsMonoNerdFontMono-BoldItalic.ttf') format('truetype');
        font-weight: 700;
        font-style: italic;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #161b22; color: #e6edf3; font-family: system-ui, -apple-system, sans-serif; }
      #app { display: flex; height: 100vh; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
