[advisories]
version = 2
ignore = [
  # gtk-rs GTK3 bindings — transitive deps from Tauri's Linux webview stack
  "RUSTSEC-2024-0411", # atk
  "RUSTSEC-2024-0412", # atk-sys
  "RUSTSEC-2024-0413", # cairo-rs
  "RUSTSEC-2024-0414", # cairo-sys-rs
  "RUSTSEC-2024-0415", # gdk
  "RUSTSEC-2024-0416", # gdk-pixbuf
  "RUSTSEC-2024-0417", # gdk-pixbuf-sys
  "RUSTSEC-2024-0418", # gdk-sys
  "RUSTSEC-2024-0419", # gio
  "RUSTSEC-2024-0420", # gio-sys
  "RUSTSEC-2025-0057", # gtk
  "RUSTSEC-2025-0075", # gtk-sys
  "RUSTSEC-2025-0080", # pango
  "RUSTSEC-2025-0081", # pango-sys
  "RUSTSEC-2025-0098", # glib
  "RUSTSEC-2025-0100", # glib-sys
  # Other unmaintained transitive deps from Tauri
  "RUSTSEC-2024-0370", # proc-macro-error — used by tauri macros
  "RUSTSEC-2017-0008", # serial — used by portable-pty
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "BSL-1.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "gnar-term"
expression = "MIT"
license-files = []
