<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gnar orange gradient -->
    <linearGradient id="gnarOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7A5C"/>
      <stop offset="50%" stop-color="#FA5539"/>
      <stop offset="100%" stop-color="#D63A20"/>
    </linearGradient>
    <!-- Flame gradient -->
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FA5539"/>
      <stop offset="40%" stop-color="#FF8C42"/>
      <stop offset="80%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FFF3B0"/>
    </linearGradient>
    <!-- Inner flame -->
    <linearGradient id="flameInner" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FA5539"/>
      <stop offset="50%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FFF8E1"/>
    </linearGradient>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2E"/>
      <stop offset="100%" stop-color="#1A1A1E"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Flame behind tiger (outer) -->
  <path d="M256 60
           C230 100, 160 130, 140 190
           C120 250, 145 300, 150 320
           C130 280, 135 250, 155 230
           C145 260, 130 310, 140 350
           C155 320, 165 290, 180 280
           C170 320, 155 360, 165 390
           C180 360, 195 330, 210 320
           C200 350, 190 380, 200 410
           C215 380, 230 350, 245 340
           C240 370, 235 400, 256 430
           C277 400, 272 370, 267 340
           C282 350, 297 380, 312 410
           C322 380, 312 350, 302 320
           C317 330, 332 360, 347 390
           C357 360, 342 320, 332 280
           C347 290, 357 320, 372 350
           C382 310, 367 260, 357 230
           C377 250, 382 280, 362 320
           C367 300, 392 250, 372 190
           C352 130, 282 100, 256 60Z"
        fill="url(#flame)" opacity="0.9"/>

  <!-- Flame inner glow -->
  <path d="M256 120
           C240 150, 195 180, 185 220
           C175 260, 190 290, 200 310
           C195 290, 200 270, 210 260
           C205 280, 195 310, 210 340
           C220 320, 230 300, 240 295
           C235 320, 240 350, 256 370
           C272 350, 277 320, 272 295
           C282 300, 292 320, 302 340
           C317 310, 307 280, 302 260
           C312 270, 317 290, 312 310
           C322 290, 337 260, 327 220
           C317 180, 272 150, 256 120Z"
        fill="url(#flameInner)" opacity="0.7"/>

  <!-- Tiger head -->
  <!-- Main head shape -->
  <path d="M256 175
           C200 175, 155 210, 145 260
           C135 310, 155 355, 190 380
           C210 395, 235 405, 256 410
           C277 405, 302 395, 322 380
           C357 355, 377 310, 367 260
           C357 210, 312 175, 256 175Z"
        fill="url(#gnarOrange)"/>

  <!-- Ears -->
  <path d="M175 205 L145 140 L195 190 Z" fill="url(#gnarOrange)"/>
  <path d="M337 205 L367 140 L317 190 Z" fill="url(#gnarOrange)"/>
  <!-- Inner ears -->
  <path d="M178 200 L160 155 L195 192 Z" fill="#D63A20"/>
  <path d="M334 200 L352 155 L317 192 Z" fill="#D63A20"/>

  <!-- Tiger stripes on forehead -->
  <path d="M220 200 C225 185, 235 180, 240 195" stroke="#D63A20" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M248 195 C253 178, 259 178, 264 195" stroke="#D63A20" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M272 200 C277 185, 287 180, 292 195" stroke="#D63A20" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="215" cy="265" rx="28" ry="24" fill="white"/>
  <ellipse cx="220" cy="267" rx="14" ry="16" fill="#1A1A1E"/>
  <circle cx="225" cy="261" r="5" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="297" cy="265" rx="28" ry="24" fill="white"/>
  <ellipse cx="292" cy="267" rx="14" ry="16" fill="#1A1A1E"/>
  <circle cx="297" cy="261" r="5" fill="white"/>

  <!-- Nose -->
  <path d="M248 310 C248 300, 264 300, 264 310 C264 318, 256 324, 256 324 C256 324, 248 318, 248 310Z"
        fill="#D63A20"/>

  <!-- Mouth -->
  <path d="M256 324 C256 324, 240 340, 230 335" stroke="#D63A20" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M256 324 C256 324, 272 340, 282 335" stroke="#D63A20" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek stripes -->
  <!-- Left -->
  <path d="M155 260 C165 255, 180 258, 185 265" stroke="#D63A20" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M150 280 C162 277, 178 280, 183 288" stroke="#D63A20" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M155 300 C165 298, 180 302, 188 312" stroke="#D63A20" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Right -->
  <path d="M357 260 C347 255, 332 258, 327 265" stroke="#D63A20" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M362 280 C350 277, 334 280, 329 288" stroke="#D63A20" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M357 300 C347 298, 332 302, 324 312" stroke="#D63A20" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Chin white patch -->
  <ellipse cx="256" cy="365" rx="35" ry="25" fill="#FFB89A" opacity="0.6"/>

  <!-- Terminal cursor hint at bottom -->
  <text x="256" y="468" text-anchor="middle" dominant-baseline="central"
        font-family="'JetBrains Mono', 'SF Mono', monospace" font-weight="700" font-size="36"
        fill="#FA5539" opacity="0.8">&gt;_</text>
</svg>
